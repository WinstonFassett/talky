# Core Talky Profiles - authoritative combinations for all users
# Users can disable these in their personal ~/.talky/talky-profiles.yaml
talky_profiles:

  # OpenClaw
  openclaw:
    description: "OpenClaw"

  # Moltis
  moltis:
    description: "Moltis"
    llm_backend: "moltis"

  # Pi coding agent (RPC mode, interruptible)
  pi:
    description: "Pi"
    llm_backend: "pi"

  # Claude Code via Agent SDK
  claude:
    description: "Claude"
    llm_backend: "claude-code"

  # Hermes agent (NousResearch) — background, thread bridge, mid-tool interrupt
  hermes:
    description: "Hermes"
    llm_backend: "hermes"

