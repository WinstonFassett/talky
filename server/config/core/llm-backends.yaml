# LLM Backends — each needs service_class (dotted import path), config.
# Optional `announcement` is an impersonal system cue spoken when the user
# *manually* switches to this profile in the picker (e.g. "OpenClaw channel").
# It's a "channel changed" UX cue, not a greeting from the agent. Agents that
# join via the /ws/agent extension speak their own greeting through the TTS
# stream — no system announcement fires on that path. Tickets 8c9d, e540.
# Optional `greeting` is the *instruction* handed to the agent on /ws/agent
# connect so the agent generates its own greeting words. Set to "__none__"
# to disable. Omit either field for the default behavior. Ticket 5d95.
llm_backends:
  openclaw:
    description: "OpenClaw - OpenAI-compatible LLM"
    service_class: "server.backends.openclaw.OpenClawLLMService"
    announcement: "OpenClaw channel."
    config:
      model: "gpt-4o"
      api_key: ""  # Will be loaded from credentials
      session_key: "agent:main:main"  # Default session key for OpenClaw
  moltis:
    description: "Moltis - Anthropic Claude"
    service_class: "server.backends.moltis.MoltisLLMService"
    announcement: "Moltis channel."
    config:
      model: "claude-3-5-sonnet-20241022"
      api_key: ""  # Will be loaded from credentials
      session_key: "agent:main:main"  # Default session key
  openclaw-voice:
    description: "OpenClaw - native Talk API (streaming, barge-in)"
    service_class: "server.backends.openclaw.OpenClawVoiceLLMService"
    announcement: "OpenClaw voice channel open."
    config:
      session_key: "agent:main:main"
      talk_mode: "stt-tts/managed-room"
  agent-ext:
    description: "Agent extension bridge (WebSocket, any agent CLI)"
    service_class: "pipecat_mcp_server.agent_ext_llm_service.AgentExtensionLLMService"
    # No announcement — the agent speaks its own greeting via the TTS stream.
    config: {}
  pi:
    description: "Pi coding agent (RPC mode, interruptible)"
    service_class: "server.backends.pi_rpc.PiRPCLLMService"
    announcement: "Pi channel."
    config:
      provider: "github-copilot"
      model: "gpt-4o"
  claude-code:
    description: "Claude Code via Agent SDK (thread bridge, turn-boundary interrupt)"
    service_class: "server.backends.claude_code.ClaudeCodeLLMService"
    extra: "claude-code"
    announcement: "Claude here."
    config:
      permission_mode: "acceptEdits"
      max_turns: 10
      cwd: null
  hermes:
    description: "Hermes agent (NousResearch) via thread bridge, mid-tool interrupt"
    service_class: "server.backends.hermes.HermesLLMService"
    announcement: "Hermes channel."
    config:
      cwd: null
      max_turns: 90
  opencode:
    description: "Opencode (sst/opencode) via HTTP server, streaming + permission asks"
    service_class: "server.backends.opencode.OpencodeLLMService"
    extra: "opencode"
    announcement: "Opencode channel."
    config:
      # Where opencode serve is listening. Auto-spawned if auto_spawn=true and nothing answers.
      base_url: "http://127.0.0.1:4096"
      auto_spawn: true
      cwd: null
      # Leave provider_id/model_id null to defer to opencode's /config defaults.
      provider_id: "opencode"
      model_id: "claude-haiku-4-5"
      # Per-session permission ruleset. Each entry: {permission, pattern, action}
      # where action ∈ allow|deny|ask. Empty list = no asks.
      permissions:
        - {permission: "bash", pattern: "*", action: "ask"}
        - {permission: "edit", pattern: "*", action: "ask"}
