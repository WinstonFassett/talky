# Talky Settings — set your preferred llm_backend and voice_profile
defaults:
  llm_backend: "openclaw"
  voice_profile: "default"
  talky_profile: "openclaw"

# Network settings
network:
  host: "localhost"  # Change to "0.0.0.0" for external access
  external_host: ""  # External hostname for browser URLs (configure for your setup)
  daemon_port: 9090
