# Talky Profiles Template - Copied to ~/.talky/ for new users
# Extends the core profiles in server/config/core/talky-profiles.yaml
#
# Profiles with a `launcher:` block are foreground: `talky <profile>` execs
# into the agent's CLI binary with the voice extension loaded. Profiles
# without a launcher block are background / remote: `talky <profile>` just
# switches the daemon's active LLM (the browser drives the conversation).

talky_profiles:

  openclaw:
    description: "OpenClaw"

  moltis:
    description: "Moltis"
    llm_backend: "moltis"

  # Pi — foreground (exec into Pi terminal with voice extension)
  pi:
    description: "Pi"
    llm_backend: "agent-ext"
    launcher:
      mode: foreground
      command: ["pi"]
      extension_arg: "-e"
      extension: "{project_root}/extensions/pi-voice/extension.ts"
      autoconnect_browser: true

  # Pi — background RPC mode (no terminal, interruptible)
  pi-bg:
    description: "Pi (background)"
    llm_backend: "pi"

  # Claude — foreground (Node-side Claude Agent SDK bridge)
  claude:
    description: "Claude"
    llm_backend: "agent-ext"
    launcher:
      mode: foreground
      command: ["node", "{extension}"]
      extension: "{project_root}/extensions/claude-voice/index.mjs"
      autoconnect_browser: true

  # Claude — background (daemon-side Agent SDK thread bridge, no terminal)
  claude-bg:
    description: "Claude (background)"
    llm_backend: "claude-code"
